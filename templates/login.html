<body style="background: #131314; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <form method="POST" style="background: #1e1f20; padding: 40px; border-radius: 20px; width: 300px;">
        <h2>Connexion</h2>
        <input type="text" name="username" placeholder="Nom d'utilisateur" required style="width: 100%; margin-bottom: 10px; padding: 10px;"><br>
        <input type="password" name="password" placeholder="Mot de passe" required style="width: 100%; margin-bottom: 20px; padding: 10px;"><br>
        <button type="submit" style="width: 100%; padding: 10px; background: #4285f4; color: white; border: none; border-radius: 5px;">Se connecter</button>
        <p>Pas de compte ? <a href="/register" style="color: #8ab4f8;">S'inscrire</a></p>
    </form>
</body>
